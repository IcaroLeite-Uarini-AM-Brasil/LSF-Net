<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSF-Net - Localizador de Seres Físicos em Rede</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Navbar -->
        <nav class="navbar">
            <div class="navbar-content">
                <div class="navbar-brand">
                    <i class="fas fa-network-wired"></i>
                    <span>LSF-Net</span>
                </div>
                <div class="navbar-status" id="statusIndicator">
                    <span class="status-dot"></span>
                    Conectando...
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Stats Cards -->
            <section class="stats-section">
                <div class="stat-card">
                    <div class="stat-icon devices">
                        <i class="fas fa-mobile-alt"></i>
                    </div>
                    <div class="stat-info">
                        <h3>Dispositivos</h3>
                        <p class="stat-value" id="totalDevices">0</p>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon online">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <div class="stat-info">
                        <h3>Online</h3>
                        <p class="stat-value" id="onlineDevices">0</p>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon locations">
                        <i class="fas fa-map-marker-alt"></i>
                    </div>
                    <div class="stat-info">
                        <h3>Localizações</h3>
                        <p class="stat-value" id="totalLocations">0</p>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-icon status">
                        <i class="fas fa-heartbeat"></i>
                    </div>
                    <div class="stat-info">
                        <h3>Sistema</h3>
                        <p class="stat-value" id="systemStatus">OK</p>
                    </div>
                </div>
            </section>

            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-btn active" data-tab="devices">
                    <i class="fas fa-list"></i> Dispositivos
                </button>
                <button class="tab-btn" data-tab="locations">
                    <i class="fas fa-history"></i> Histórico
                </button>
                <button class="tab-btn" data-tab="register">
                    <i class="fas fa-plus"></i> Registrar
                </button>
            </div>

            <!-- Tab: Devices -->
            <div id="devices-tab" class="tab-content active">
                <div class="section-header">
                    <h2>Dispositivos Registrados</h2>
                    <button class="btn-refresh" onclick="loadDevices()">
                        <i class="fas fa-sync-alt"></i> Atualizar
                    </button>
                </div>
                <div id="devicesList" class="devices-grid">
                    <p class="loading">Carregando dispositivos...</p>
                </div>
            </div>

            <!-- Tab: Locations -->
            <div id="locations-tab" class="tab-content">
                <div class="section-header">
                    <h2>Histórico de Localizações</h2>
                    <button class="btn-refresh" onclick="loadLocations()">
                        <i class="fas fa-sync-alt"></i> Atualizar
                    </button>
                </div>
                <div id="locationsList" class="locations-list">
                    <p class="loading">Carregando localizações...</p>
                </div>
            </div>

            <!-- Tab: Register Device -->
            <div id="register-tab" class="tab-content">
                <div class="section-header">
                    <h2>Registrar Novo Dispositivo</h2>
                </div>
                <form id="deviceForm" class="form-group">
                    <div class="form-field">
                        <label for="deviceName">Nome do Dispositivo</label>
                        <input type="text" id="deviceName" placeholder="Ex: João Silva" required>
                    </div>

                    <div class="form-field">
                        <label for="deviceMac">Endereço MAC</label>
                        <input type="text" id="deviceMac" placeholder="Ex: 00:1A:2B:3C:4D:5E" required>
                    </div>

                    <div class="form-field">
                        <label for="deviceType">Tipo</label>
                        <select id="deviceType">
                            <option value="smartphone">Smartphone</option>
                            <option value="tablet">Tablet</option>
                            <option value="wearable">Wearable</option>
                            <option value="other">Outro</option>
                        </select>
                    </div>

                    <button type="submit" class="btn-primary">
                        <i class="fas fa-plus"></i> Registrar
                    </button>
                </form>
                <div id="formMessage" class="form-message"></div>
            </div>
        </main>
    </div>

    <!-- Toast Notifications -->
    <div id="toast" class="toast"></div>

    <!-- Scripts -->
    <script src="js/main.js"></script>
</body>
</html>
